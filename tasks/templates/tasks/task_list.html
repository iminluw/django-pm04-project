<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мой менеджер задач</title>
    <!-- Подключаем Bootstrap для красоты -->
    <link href="https://jsdelivr.net" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h2 class="mb-0">Список моих задач (ПМ.04)</h2>
                    </div>
                    <div class="card-body">
                        <ul class="list-group">
                            {% for task in tasks %}
                            <li class="list-group-item d-flex justify-content-between align-items-center">
                                <div>
                                    <strong class="h5">{{ task.title }}</strong>
                                    <p class="mb-0 text-muted">{{ task.description }}</p>
                                </div>
                                {% if task.completed %}
                                    <span class="badge bg-success">Готово</span>
                                {% else %}
                                    <span class="badge bg-warning text-dark">В работе</span>
                                {% endif %}
                            </li>
                            {% empty %}
                            <li class="list-group-item text-center">Задач пока нет. Добавьте их в админке!</li>
                            {% endfor %}
                        </ul>
                    </div>
                    <div class="card-footer text-center text-muted">
                        Учебный проект Django
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
